<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2bb8" />
      <stop offset="50%" stop-color="#0d1666" />
      <stop offset="100%" stop-color="#070d3d" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Crest area (white circle as placeholder for the crest image baked in) -->
  <g transform="translate(840 110)">
    <image href="/crest.png" x="0" y="0" width="280" height="280" style="filter:invert(1)"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600"
        letter-spacing="6" fill="rgba(255,255,255,0.65)">
    BETA ZETA · VIRGINIA TECH
  </text>

  <!-- Headline -->
  <text x="80" y="260" font-family="'Playfair Display', Georgia, serif" font-size="84" font-weight="700"
        fill="white">
    Lambda Phi
  </text>
  <text x="80" y="350" font-family="'Playfair Display', Georgia, serif" font-size="84" font-weight="700"
        fill="white">
    Epsilon
  </text>

  <!-- Subhead -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400"
        fill="rgba(255,255,255,0.78)">
    The world's largest Asian-interest fraternity.
  </text>
  <text x="80" y="466" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400"
        fill="rgba(255,255,255,0.78)">
    Founded at VT, December 21, 2003.
  </text>

  <!-- Greek motto across the bottom -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="80" y="585" font-family="'Playfair Display', Georgia, serif" font-size="22" font-style="italic"
        fill="rgba(255,255,255,0.6)" letter-spacing="2">
    ἡγεμόνες ἐν ἀνθρώποις εἶναι
  </text>
  <text x="1120" y="585" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="20"
        fill="rgba(255,255,255,0.55)" letter-spacing="3">
    VTLPHIE.SPACE
  </text>
</svg>
